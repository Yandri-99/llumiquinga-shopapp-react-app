name: ⚛️ Deploy React to VPS (Nginx)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create env for build
        run: |
          printf "%s" "${{ secrets.REACT_ENV }}" > .env.production

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload build to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /tmp/react_build"
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -r dist/* "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/react_build/"

      - name: Activate build on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            sudo mkdir -p /var/www/react-app
            sudo rm -rf /var/www/react-app/*
            sudo cp -r /tmp/react_build/* /var/www/react-app/
            sudo chown -R www-data:www-data /var/www/react-app
            sudo nginx -t
            sudo systemctl reload nginx
          '